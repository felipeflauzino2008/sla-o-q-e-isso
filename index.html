<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Card Capitã Marvel</title>
    <style>
        /* =========================================
           1. Configuração da Tela (Fundo Branco)
        ============================================ */
        body {
            margin: 0;
            padding: 0;
            display: flex;
            justify-content: center; 
            align-items: center;     
            height: 100vh;           
            background-color: #ffffff; 
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            overflow: hidden;
        }

        /* =========================================
           2. O Card Principal (Retângulo Fixo)
        ============================================ */
        .quadrado {
            position: relative;
            /* Suas dimensões ideais de largura e altura */
            width: 580px; 
            height: 420px;
            background: linear-gradient(45deg, #d41e31, #491f8f);
            border-radius: 20px;
            box-shadow: 0 15px 35px rgba(0, 0, 0, 0.3);
            
            /* IMPORTANTE: Mudado para VISIBLE. 
               Isso permite que a cabeça dela passe para fora do topo sem ser cortada! */
            overflow: visible; 
            
            transition: transform 0.4s ease, box-shadow 0.4s ease;
        }

        /* =========================================
           3. A Imagem (Livre no topo, presa na base)
        ============================================ */
        .imagem-marvel {
            position: absolute;
            bottom: 0; /* Pernas sempre 100% coladas na borda inferior */
            left: 50%; /* Inicia centralizada */
            
            /* Mantém o tamanho original que você gostou */
            height: 95%; 
            width: auto;
            object-fit: contain;
            object-position: bottom center;
            
            /* Estado Inicial: Centralizada e escala normal */
            transform: translateX(-50%) scale(1);
            
            /* O zoom cresce a partir do chão, empurrando a cabeça para cima */
            transform-origin: bottom center; 
            
            transition: transform 0.6s cubic-bezier(0.25, 1, 0.5, 1);
            z-index: 2;
        }

        /* EFEITO HOVER DA IMAGEM */
        .quadrado:hover .imagem-marvel {
            /* Desliza para a direita e cresce. Como mudamos o overflow, 
               a cabeça vai flutuar acima do retângulo perfeitamente em 3D! */
            transform: translateX(-5%) scale(1.15); 
        }

        /* =========================================
           4. O Bloco de Texto (Surge na Esquerda)
        ============================================ */
        .texto-container {
            position: absolute;
            left: 0;
            bottom: 0;
            width: 45%; 
            height: 100%;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            text-align: center;
            padding: 0 30px;
            box-sizing: border-box;
            color: #ffffff;
            
            /* Garante que o texto respeite o canto arredondado esquerdo do card */
            border-radius: 20px 0 0 20px; 
            overflow: hidden;

            /* Estado Inicial: Invisível e deslocado */
            opacity: 0;
            transform: translateX(-25px);
            transition: opacity 0.5s ease, transform 0.5s ease;
            z-index: 3;
        }

        /* EFEITO HOVER DO TEXTO */
        .quadrado:hover .texto-container {
            opacity: 1; 
            transform: translateX(0); 
        }

        .texto-container h2 {
            margin: 0 0 12px 0;
            font-size: 1.8rem;
            text-transform: uppercase;
            letter-spacing: 1px;
        }

        .texto-container p {
            margin: 0;
            font-size: 0.95rem;
            line-height: 1.6;
        }
    </style>
</head>
<body>

    <div class="quadrado" id="marvel-card">
        
        <img src="1.png" alt="Capitã Marvel" class="imagem-marvel">
        
        <div class="texto-container">
            <h2>Capitã Marvel</h2>
            <p>Carol Danvers torna-se uma das heroínas mais poderosas do universo quando a Terra é pega no meio de uma guerra galáctica.</p>
        </div>

    </div>

    <script>
        const card = document.getElementById('marvel-card');

        card.addEventListener('mouseenter', () => {
            card.style.transform = "perspective(1000px) rotateY(2deg)";
            card.style.transition = "transform 0.3s ease";
        });

        card.addEventListener('mouseleave', () => {
            card.style.transform = "perspective(1000px) rotateY(0deg)";
        });
    </script>
</body>
</html>
